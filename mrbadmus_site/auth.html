<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In | MrBadmusAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --darker: #0F0F1A; --dark: #1A1A2E; --card: #16213E;
      --physics: #4ECDC4; --chemistry: #FF6B6B; --biology: #6BCB77;
      --text: #E8E8F0; --muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--darker);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      border: 1px solid #2a2a4a;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--physics), var(--biology));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .tabs {
      display: flex;
      background: var(--dark);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--muted);
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--physics);
      color: #0F0F1A;
    }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      background: var(--dark);
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--physics); }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--physics), #38a89d);
      color: #0F0F1A;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #2a2a4a;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: #2a0d0d; border: 1px solid #FF6B6B; color: #ff9a9a; display: block; }
    .msg.success { background: #0d2a0d; border: 1px solid #6BCB77; color: #a8f0a8; display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<nav style="position:fixed;top:0;left:0;right:0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(15,15,26,0.95);backdrop-filter:blur(10px);border-bottom:1px solid #2a2a4a;z-index:10;">
  <a href="/index.html" style="font-family:'Fredoka One',cursive;font-size:1.3rem;text-decoration:none;background:linear-gradient(135deg,#4ECDC4,#6BCB77);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">⚗️ MrBadmusAI</a>
  <a href="/index.html" style="color:#888;font-size:0.85rem;font-weight:700;text-decoration:none;">← Back to site</a>
</nav>

<div class="card" style="margin-top:60px;">
  <div class="logo">
    <h1>⚗️ MrBadmusAI</h1>
    <p>GCSE Science Revision</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
    <div class="tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</div>
  </div>

  <div id="msg" class="msg"></div>

  <!-- SIGN IN FORM -->
  <div id="form-signin">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signin-email" placeholder="you@school.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="Your password" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" id="btn-signin" onclick="signIn()">Sign In</button>


  </div>

  <!-- SIGN UP FORM -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>First name</label>
      <input type="text" id="signup-name" placeholder="e.g. Aisha" autocomplete="given-name"/>
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signup-email" placeholder="you@school.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" id="btn-signup" onclick="signUp()">Create Account</button>



    <p style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:14px;">
      By signing up you agree to use this platform for revision purposes.
    </p>
  </div>

  <a href="/index.html" class="back-link">← Back to site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ── Config — will be injected by the generator ──────────────────
  const SUPABASE_URL     = 'https://urklkrwevjtlfbwnipjn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVya2xrcndldmp0bGZid25pcGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTQyNzksImV4cCI6MjA4OTc3MDI3OX0.pW9AP6TPlKC_XHDTbrEKrEGmGXglN0z5b0KGXD2oHvg';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function switchTab(tab) {
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-signin').className = 'tab' + (tab === 'signin' ? ' active' : '');
    document.getElementById('tab-signup').className = 'tab' + (tab === 'signup' ? ' active' : '');
    showMsg('');
  }

  function showMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (text ? ' ' + type : '');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait...' : (btnId === 'btn-signin' ? 'Sign In' : 'Create Account');
  }

  async function signIn() {
    const email    = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    if (!email || !password) return showMsg('Please enter your email and password.');

    setLoading('btn-signin', true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('btn-signin', false);

    if (error) return showMsg(error.message);
    redirectAfterAuth();
  }

  async function signUp() {
    const firstName = document.getElementById('signup-name').value.trim();
    const email     = document.getElementById('signup-email').value.trim();
    const password  = document.getElementById('signup-password').value;

    if (!firstName) return showMsg('Please enter your first name.');
    if (!email)     return showMsg('Please enter your email address.');
    if (password.length < 8) return showMsg('Password must be at least 8 characters.');

    setLoading('btn-signup', true);
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { first_name: firstName } }
    });
    setLoading('btn-signup', false);

    if (error) return showMsg(error.message);

    // Email confirmation is OFF — Supabase returns a session immediately,
    // but we need to wait for the auth state to fully persist to localStorage
    // before redirecting, otherwise profile-setup.html won't find the session.

    // If signUp didn't return a session (email confirmation is ON), show message
    if (!data.session) {
      showMsg('Check your email to confirm your account, then sign in!', 'success');
      switchTab('signin');
      return;
    }

    // Session exists — wait for it to fully persist
    // Use onAuthStateChange to detect when the session is ready
    const waitForSession = new Promise((resolve) => {
      const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
        if (session) {
          subscription.unsubscribe();
          resolve(session);
        }
      });
      // Safety timeout — if the event doesn't fire within 3s, resolve anyway
      // (the session from signUp response should already be usable)
      setTimeout(() => resolve(data.session), 3000);
    });

    const confirmedSession = await waitForSession;

    // Now upsert the first name into the profiles table
    if (confirmedSession?.user) {
      await sb.from('profiles').upsert({
        id: confirmedSession.user.id,
        first_name: firstName
      });
    }

    window.location.href = '/profile-setup.html';
  }



  function redirectAfterAuth() {
    // New users go to profile setup, returning users go home
    const returnUrl = new URLSearchParams(window.location.search).get('return') || '/index.html';
    // Check if profile is complete
    sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) return;
      sb.from('profiles').select('first_name, science_pathway').eq('id', session.user.id).single()
        .then(({ data: p }) => {
          if (!p?.science_pathway) {
            window.location.href = '/profile-setup.html';
          } else {
            window.location.href = returnUrl;
          }
        });
    });
  }

  // Check if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) redirectAfterAuth();
  });

  // Auto-switch to correct tab based on URL param (?tab=signup or ?tab=signin)
  const urlTab = new URLSearchParams(window.location.search).get('tab');
  if (urlTab === 'signup') switchTab('signup');
  if (urlTab === 'signin') switchTab('signin');
</script>
</body>
</html>
