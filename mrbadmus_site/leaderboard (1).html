<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard | MrBadmusAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --darker: #0F0F1A; --dark: #1A1A2E; --card: #16213E;
      --physics: #4ECDC4; --chemistry: #FF6B6B; --biology: #6BCB77;
      --text: #E8E8F0; --muted: #888; --yellow: #FFD93D;
      --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--darker); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(15,15,26,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid #2a2a4a; z-index: 10;
    }
    .nav-brand {
      font-family: 'Fredoka One', cursive; font-size: 1.3rem; text-decoration: none;
      background: linear-gradient(135deg, #4ECDC4, #6BCB77);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav a { color: var(--muted); text-decoration: none; font-weight: 700; font-size: 0.88rem; }

    .container { max-width: 680px; margin: 0 auto; padding: 80px 20px 40px; }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; margin-bottom: 6px; }
    .week-info {
      display: inline-block; padding: 6px 18px; border-radius: 20px;
      font-weight: 800; font-size: 0.85rem; margin-top: 8px;
    }
    .week-info.biology { background: rgba(107,203,119,0.2); color: var(--biology); }
    .week-info.chemistry { background: rgba(255,107,107,0.2); color: var(--chemistry); }
    .week-info.physics { background: rgba(78,205,196,0.2); color: var(--physics); }

    /* ── PODIUM ──────────────────────────────────── */
    .podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 12px; margin: 32px 0 40px; min-height: 280px;
    }
    .podium-slot { text-align: center; flex-shrink: 0; }
    .podium-slot.first { order: 2; }
    .podium-slot.second { order: 1; }
    .podium-slot.third { order: 3; }

    .podium-avatar {
      border-radius: 50%; overflow: hidden; margin: 0 auto 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; background: var(--dark);
    }
    .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .podium-slot.first .podium-avatar { width: 100px; height: 100px; border: 4px solid var(--gold); }
    .podium-slot.second .podium-avatar { width: 80px; height: 80px; border: 3px solid var(--silver); }
    .podium-slot.third .podium-avatar { width: 70px; height: 70px; border: 3px solid var(--bronze); }

    .podium-medal { font-size: 1.8rem; margin-bottom: 4px; }
    .podium-slot.first .podium-medal { font-size: 2.2rem; }

    .podium-name {
      font-family: 'Fredoka One', cursive; font-size: 0.95rem;
      max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .podium-slot.first .podium-name { font-size: 1.1rem; max-width: 140px; }

    .podium-school { color: var(--muted); font-size: 0.75rem; font-weight: 700; }
    .podium-score {
      font-family: 'Fredoka One', cursive; font-size: 1.2rem; margin-top: 4px;
    }
    .podium-slot.first .podium-score { font-size: 1.4rem; color: var(--gold); }
    .podium-slot.second .podium-score { color: var(--silver); }
    .podium-slot.third .podium-score { color: var(--bronze); }

    .podium-base {
      border-radius: 12px 12px 0 0; margin-top: 8px;
    }
    .podium-slot.first .podium-base { background: rgba(255,215,0,0.15); height: 100px; width: 130px; }
    .podium-slot.second .podium-base { background: rgba(192,192,192,0.1); height: 70px; width: 110px; }
    .podium-slot.third .podium-base { background: rgba(205,127,50,0.1); height: 50px; width: 110px; }

    /* ── REST OF TOP 10 ──────────────────────────── */
    .rest-list { margin-top: 8px; }
    .rest-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; background: var(--card); border: 1px solid #2a2a4a;
      border-radius: 14px; margin-bottom: 8px; transition: all 0.2s;
    }
    .rest-item:hover { border-color: #3a3a5a; }
    .rest-rank {
      font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--muted);
      width: 28px; text-align: center; flex-shrink: 0;
    }
    .rest-avatar {
      width: 44px; height: 44px; border-radius: 50%; overflow: hidden;
      border: 2px solid #2a2a4a; display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; background: var(--dark); flex-shrink: 0;
    }
    .rest-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .rest-info { flex: 1; min-width: 0; }
    .rest-name { font-weight: 800; font-size: 0.95rem; }
    .rest-school { color: var(--muted); font-size: 0.78rem; }
    .rest-score { font-family: 'Fredoka One', cursive; font-size: 1.1rem; flex-shrink: 0; }

    /* ── EMPTY STATE ─────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px;
      background: var(--card); border: 1px solid #2a2a4a; border-radius: 18px;
    }
    .empty h3 { font-family: 'Fredoka One', cursive; margin: 16px 0 8px; }
    .empty p { color: var(--muted); }

    .loading { text-align: center; padding-top: 120px; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #2a2a4a; border-top-color: var(--physics);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .cta-challenge {
      display: block; text-align: center; margin-top: 28px; padding: 16px;
      border-radius: 16px; background: linear-gradient(135deg, var(--physics), #38a89d);
      color: #0F0F1A; font-family: 'Fredoka One', cursive; font-size: 1.1rem;
      text-decoration: none; transition: all 0.2s;
    }
    .cta-challenge:hover { opacity: 0.9; transform: translateY(-2px); }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/index.html">⚗️ MrBadmusAI</a>
  <div style="display:flex;gap:12px;align-items:center;">
    <a href="/weekly-challenge.html">⚡ Challenge</a>
    <a href="/index.html">Home</a>
  </div>
</nav>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:var(--muted);">Loading leaderboard...</p>
  </div>

  <div id="content" style="display:none;">
    <div class="header">
      <h1>🏆 Weekly Leaderboard</h1>
      <div class="week-info" id="week-info">Loading...</div>
    </div>

    <div class="podium" id="podium"></div>
    <div class="rest-list" id="rest-list"></div>
    <div class="empty" id="empty" style="display:none;">
      <div style="font-size:3rem;">🏟️</div>
      <h3>No scores yet this week!</h3>
      <p>Be the first to complete the challenge and claim the top spot.</p>
    </div>

    <a href="/weekly-challenge.html" class="cta-challenge">Take This Week's Challenge ⚡</a>
  </div>
</div>

<script>
  var RENDER_URL = 'https://mrbadmus-backend.onrender.com';
  var medals = ['🥇', '🥈', '🥉'];
  var subjectEmojis = { biology: '🌿 Biology', chemistry: '🧪 Chemistry', physics: '⚡ Physics' };

  // Pre-warm Render backend
  fetch(RENDER_URL + '/api/health').catch(function(){});

  async function init() {
    try {
      var res = await fetch(RENDER_URL + '/api/weekly-leaderboard');
      var data = await res.json();

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      // Week info
      var infoEl = document.getElementById('week-info');
      if (data.subject) {
        infoEl.textContent = (subjectEmojis[data.subject] || data.subject) + ' — Week of ' + formatDate(data.week_start);
        infoEl.className = 'week-info ' + data.subject;
      } else {
        infoEl.textContent = 'Week of ' + formatDate(data.week_start);
      }

      var lb = data.leaderboard || [];

      if (lb.length === 0) {
        document.getElementById('empty').style.display = 'block';
        return;
      }

      // Podium (top 3)
      var podiumHtml = '';
      var podiumClasses = ['', 'first', 'second', 'third'];
      for (var i = 0; i < Math.min(3, lb.length); i++) {
        var p = lb[i];
        var avatarContent = p.avatar_url
          ? '<img src="' + p.avatar_url + '" alt=""/>'
          : '🧑‍🎓';
        var timeTxt = p.time_taken ? formatTime(p.time_taken) : '';

        podiumHtml += '<div class="podium-slot ' + podiumClasses[i + 1] + '">' +
          '<div class="podium-medal">' + medals[i] + '</div>' +
          '<div class="podium-avatar">' + avatarContent + '</div>' +
          '<div class="podium-name">' + escHtml(p.name) + '</div>' +
          '<div class="podium-school">' + escHtml(p.school || '') + '</div>' +
          '<div class="podium-score">' + p.score + '/' + p.max_score + '</div>' +
          (timeTxt ? '<div style="font-size:0.7rem;color:var(--muted);margin-top:2px;">' + timeTxt + '</div>' : '') +
          '<div class="podium-base"></div>' +
          '</div>';
      }
      document.getElementById('podium').innerHTML = podiumHtml;

      // Rest (4th–10th)
      if (lb.length > 3) {
        var restHtml = '';
        for (var j = 3; j < lb.length; j++) {
          var r = lb[j];
          var rAvatar = r.avatar_url
            ? '<img src="' + r.avatar_url + '" alt=""/>'
            : '🧑‍🎓';
          restHtml += '<div class="rest-item">' +
            '<span class="rest-rank">' + r.rank + '</span>' +
            '<div class="rest-avatar">' + rAvatar + '</div>' +
            '<div class="rest-info">' +
              '<div class="rest-name">' + escHtml(r.name) + '</div>' +
              '<div class="rest-school">' + escHtml(r.school || '') + '</div>' +
            '</div>' +
            '<span class="rest-score">' + r.score + '/' + r.max_score + '</span>' +
            '</div>';
        }
        document.getElementById('rest-list').innerHTML = restHtml;
      }

    } catch (err) {
      console.error(err);
      document.getElementById('loading').innerHTML = '<p style="color:var(--chemistry);">Could not load leaderboard. Try refreshing.</p>';
    }
  }
  init();

  function formatDate(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr + 'T00:00:00');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  function formatTime(secs) {
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    return m + 'm ' + s + 's';
  }

  function escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
