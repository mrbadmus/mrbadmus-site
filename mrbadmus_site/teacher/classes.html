<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My classes — Mr Badmus AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --darker:    #0F0F1A;
      --dark:      #1A1A2E;
      --card:      #16213E;
      --card2:     #1A2545;
      --text:      #E8F4FD;
      --muted:     #8892A4;
      --physics:   #4ECDC4;
      --chemistry: #FF6B6B;
      --biology:   #6BCB77;
      --science:   #A78BD0;
      --radius:    12px;
      --shadow:    0 4px 20px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--darker);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      padding: 80px 20px 60px;
      /* Hidden until requireTeacherRole's onAllowed callback fires.
         Fail-closed: if the guard bounces or JS fails, the page never
         reveals teacher content. */
      display: none;
    }

    /* ── NAV (reused from MRB-19 placeholder) ── */
    nav.top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,26,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #2a2a4a;
      z-index: 10;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .pill.env-test { background: rgba(255,217,61,0.18); color: #FFD93D; }
    .pill.env-prod { background: rgba(136,136,136,0.18); color: var(--muted); }
    .signout-btn {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .signout-btn:hover { border-color: var(--chemistry); color: var(--chemistry); }

    /* ── PAGE HEADER ── */
    .container { max-width: 1100px; margin: 0 auto; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .page-header .subtitle {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 600;
    }

    /* ── CARDS GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 600px)  { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px)  { .cards-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── CLASS CARD (button — keyboard focusable, screen-reader friendly) ── */
    .class-card {
      background: var(--card);
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 22px 20px;
      text-align: left;
      color: inherit;
      font: inherit;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .class-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: rgba(255,255,255,0.18);
    }
    .class-card:focus-visible {
      outline: 2px solid var(--physics);
      outline-offset: 2px;
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .card-name {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .card-pill {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--darker);
      white-space: nowrap;
    }
    .card-meta {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .card-students {
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 600;
    }
    .card-completion { display: flex; flex-direction: column; gap: 6px; }
    .card-completion-empty {
      color: var(--muted);
      font-size: 0.88rem;
      font-style: italic;
    }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-bar {
      flex: 1;
      height: 8px;
      background: var(--card2);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--biology);
      border-radius: 999px;
      transition: width 0.4s;
    }
    .progress-pct {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      min-width: 38px;
      text-align: right;
    }
    .progress-sub {
      color: var(--text);
      opacity: 0.85;
      font-size: 0.78rem;
    }
    .card-activity {
      color: var(--text);
      opacity: 0.85;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: auto;
      padding-top: 4px;
      border-top: 1px dashed rgba(255,255,255,0.08);
    }

    /* ── STATES (loading / empty / error) ── */
    .state-block { display: none; padding: 60px 20px; text-align: center; }
    .state-block.show { display: block; }
    .state-block h2 {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 10px;
    }
    .state-block p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 480px;
      margin: 0 auto 20px;
      line-height: 1.55;
    }
    .state-btn {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 22px;
      background: var(--physics);
      color: var(--darker);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .state-btn:hover { opacity: 0.85; }
    .state-loading .dots { display: inline-flex; gap: 6px; margin-top: 10px; }
    .state-loading .dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .state-loading .dots span:nth-child(2) { animation-delay: 0.2s; }
    .state-loading .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid #2a2a4a;
      color: var(--text);
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="/index.html" style="font-family:'Sora',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);text-decoration:none;letter-spacing:0.01em;">MrBadmusAI</a>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="env-pill" class="pill env-prod" title=""></span>
    <span id="nav-user-area" style="color:#888;font-weight:700;font-size:0.85rem;"></span>
    <button class="signout-btn" onclick="MrBadmusTeacherGuard.signOut()">Sign out</button>
  </div>
</nav>

<main class="container">
  <header class="page-header">
    <h1>My classes</h1>
    <p class="subtitle" id="subtitle">Loading…</p>
  </header>

  <div id="state-loading" class="state-block state-loading show">
    <p>Loading your classes</p>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <div id="state-cards" class="cards-grid" style="display:none;"></div>

  <div id="state-empty" class="state-block">
    <h2>No classes yet</h2>
    <p>Your school admin will add you to classes soon. In the meantime, want to explore Mr Badmus AI?</p>
    <a class="state-btn" href="/index.html">Back to homepage</a>
  </div>

  <div id="state-error" class="state-block">
    <h2>Couldn't load your classes</h2>
    <p>Something went wrong. Please refresh the page.</p>
    <button class="state-btn" onclick="window.location.reload()">Refresh</button>
  </div>
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- ── Bootstrap: SDK → config → guard → data → render ─────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/shared/config.js"></script>
<script src="/shared/teacher-guard.js"></script>
<script src="/shared/teacher-data.js"></script>
<script>
(function () {
  const STATES = {
    loading: document.getElementById('state-loading'),
    cards:   document.getElementById('state-cards'),
    empty:   document.getElementById('state-empty'),
    error:   document.getElementById('state-error'),
  };
  // Reveal exactly one state at a time. Cards block uses display:grid;
  // the others use the .show class on .state-block.
  function showState(name) {
    Object.keys(STATES).forEach(function (k) {
      const el = STATES[k];
      if (k === 'cards') {
        el.style.display = name === 'cards' ? 'grid' : 'none';
      } else {
        el.classList.toggle('show', k === name);
      }
    });
  }

  // Floor everything (so "59 minutes ago", not "1 hour ago"). The result
  // is computed once at render time — page won't tick its labels live.
  function formatRelativeTime(iso) {
    if (!iso) return 'No activity yet';
    const then = new Date(iso).getTime();
    if (isNaN(then)) return 'No activity yet';
    const sec = Math.floor((Date.now() - then) / 1000);
    if (sec < 60) return 'just now';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + ' minute' + (min === 1 ? '' : 's') + ' ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' hour' + (hr === 1 ? '' : 's') + ' ago';
    const day = Math.floor(hr / 24);
    if (day < 7) return day + ' day' + (day === 1 ? '' : 's') + ' ago';
    if (day < 30) {
      const wk = Math.floor(day / 7);
      return wk + ' week' + (wk === 1 ? '' : 's') + ' ago';
    }
    if (day < 365) {
      const mo = Math.floor(day / 30);
      return mo + ' month' + (mo === 1 ? '' : 's') + ' ago';
    }
    const yr = Math.floor(day / 365);
    return yr + ' year' + (yr === 1 ? '' : 's') + ' ago';
  }

  const toastEl = document.getElementById('toast');
  let toastTimer = null;
  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastEl.classList.remove('show');
    }, 2000);
  }

  // Class names come from school admins, not validated student input, but
  // anything reaching innerHTML gets escaped — defence in depth.
  function escapeHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  function capitalise(str) {
    if (!str) return '';
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function buildMetaLine(klass) {
    const parts = [];
    if (klass.year_group != null) parts.push('Year ' + klass.year_group);
    if (klass.tier)               parts.push(capitalise(klass.tier));
    if (klass.science_pathway)    parts.push(capitalise(klass.science_pathway));
    return parts.join(' · ');
  }

  function buildStudentLine(n) {
    if (!n)      return 'No students yet';
    if (n === 1) return '1 student';
    return n + ' students';
  }

  function buildCompletionBlock(klass) {
    if (klass.assignment_count === 0) {
      return '<div class="card-completion-empty">No assignments yet</div>';
    }
    const denom = klass.student_count * klass.assignment_count;
    const sub = '<div class="progress-sub">' +
      escapeHtml(klass.submission_count) + ' of ' + escapeHtml(denom) + ' submissions' +
      '</div>';

    // Zero-students-with-assignments case: dash, not a misleading 0%.
    if (klass.completion_pct == null) {
      return '<div class="card-completion">' +
        '<div class="progress-row"><span class="progress-pct">—</span></div>' +
        sub +
        '</div>';
    }

    const pct = klass.completion_pct;
    return '<div class="card-completion">' +
      '<div class="progress-row">' +
        '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
        '<span class="progress-pct">' + pct + '%</span>' +
      '</div>' +
      sub +
      '</div>';
  }

  function renderCard(klass) {
    const btn = document.createElement('button');
    btn.className = 'class-card';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Open class ' + klass.name);

    let pillHtml = '';
    if (klass.pill_label) {
      pillHtml = '<span class="card-pill" style="background:' +
        escapeHtml(klass.pill_colour_var) + ';">' +
        escapeHtml(klass.pill_label) + '</span>';
    }

    const meta = buildMetaLine(klass);
    const metaHtml = meta
      ? '<div class="card-meta">' + escapeHtml(meta) + '</div>'
      : '';

    const activity = klass.last_activity_at
      ? 'Last activity: ' + formatRelativeTime(klass.last_activity_at)
      : 'No activity yet';

    btn.innerHTML =
      '<div class="card-top">' +
        '<div class="card-name">' + escapeHtml(klass.name) + '</div>' +
        pillHtml +
      '</div>' +
      metaHtml +
      '<div class="card-students">' + escapeHtml(buildStudentLine(klass.student_count)) + '</div>' +
      buildCompletionBlock(klass) +
      '<div class="card-activity">' + escapeHtml(activity) + '</div>';

    btn.addEventListener('click', function () {
      // MRB-38 will replace this with:
      //   window.location.href = '/teacher/class-detail.html?class=' + klass.id;
      showToast('Class detail coming soon');
    });

    return btn;
  }

  function renderCards(classes) {
    const grid = STATES.cards;
    grid.innerHTML = '';
    classes.forEach(function (k) { grid.appendChild(renderCard(k)); });
  }

  MrBadmusTeacherGuard.requireTeacherRole({
    onAllowed: async function (ctx) {
      const firstName = ctx.profile.first_name || 'teacher';
      const env = (window.MrBadmusConfig && window.MrBadmusConfig.environment) || 'prod';

      document.getElementById('nav-user-area').textContent = '👤 ' + firstName;

      const envEl = document.getElementById('env-pill');
      envEl.textContent = env.toUpperCase();
      envEl.className = 'pill env-' + env;
      envEl.title = env === 'test'
        ? 'Test sandbox — fake data only'
        : 'Production — live student data';

      const subtitleEl = document.getElementById('subtitle');
      subtitleEl.textContent = firstName + ', loading your classes…';

      // Reveal the page now — guard approved, profile populated. The
      // loading state is already visible inside the body wrapper.
      document.body.style.display = 'block';

      try {
        const classes = await MrBadmusTeacherData.loadTeacherClasses();
        if (!classes || classes.length === 0) {
          subtitleEl.style.display = 'none';
          showState('empty');
          return;
        }
        const n = classes.length;
        subtitleEl.textContent =
          firstName + ', you teach ' + n + ' class' + (n === 1 ? '' : 'es');
        renderCards(classes);
        showState('cards');
      } catch (e) {
        console.error('[classes.html] loadTeacherClasses failed', e);
        subtitleEl.style.display = 'none';
        showState('error');
      }
    },
  });
})();
</script>

</body>
</html>
