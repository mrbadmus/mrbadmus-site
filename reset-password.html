<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#F7F1E5"/>
  <title>Reset your password — MrBadmusAI</title>
  <link rel="preload" href="/shared/fonts/fraunces-var-latin.woff2" as="font" type="font/woff2" crossorigin/>
  <link rel="preload" href="/shared/fonts/plus-jakarta-sans-var-latin.woff2" as="font" type="font/woff2" crossorigin/>
  <link rel="stylesheet" href="/shared/tokens.css?v=f21cf111"/>
  <script src="/shared/search-index.js" defer></script>
  <script src="/shared/search.js" defer></script>
  <style>
    html { background: var(--bg); }
    :root {
      --darker: var(--bg); --dark: var(--sunken);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 {
      font-family: var(--font-serif);
      font-optical-sizing: auto;
      font-weight: 600;
      font-size: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .page-title {
      font-family: var(--font-serif);
      font-optical-sizing: auto;
      font-weight: 600;
      font-size: 1.15rem;
      text-align: center;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--on-accent);
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .msg {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: var(--danger-soft); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .msg.success { background: var(--success-soft); border: 1px solid var(--success); color: var(--success); display: block; }

    .state-note { color: var(--muted); font-size: 0.9rem; text-align: center; line-height: 1.55; }

    .back-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 20px;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1><svg width="30" height="30" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;"><path d="M4 6l4-4 4 4" stroke="url(#resetHeroGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 6l4-4 4 4" stroke="url(#resetHeroGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(4,6)"/><defs><linearGradient id="resetHeroGrad" x1="4" y1="2" x2="16" y2="12" gradientUnits="userSpaceOnUse"><stop style="stop-color:var(--brand-grad-a)"/><stop offset="1" style="stop-color:var(--brand-grad-b)"/></linearGradient></defs></svg> MrBadmusAI</h1>
    <p>GCSE Science Revision</p>
  </div>

  <div class="page-title">Reset your password</div>
  <div id="msg" class="msg"></div>

  <!-- Checking the link from the email -->
  <div id="state-loading">
    <p class="state-note">Checking your reset link…</p>
  </div>

  <!-- Link invalid / expired / page opened directly -->
  <div id="state-invalid" style="display:none">
    <p class="state-note" id="invalid-reason">
      This page only works from a password-reset email link.
    </p>
    <a class="btn btn-primary" id="btn-request-new" href="/auth.html" style="display:block;text-align:center;text-decoration:none;margin-top:18px;">Request a new link</a>
  </div>

  <!-- Valid recovery session: choose a new password -->
  <div id="state-form" style="display:none">
    <div class="form-group">
      <label>New password</label>
      <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Confirm new password</label>
      <input type="password" id="confirm-password" placeholder="Type it again" autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" id="btn-save" onclick="savePassword()">Set new password</button>
  </div>

  <!-- Done -->
  <div id="state-done" style="display:none">
    <p class="state-note">You’re all set — taking you back in…</p>
  </div>

  <a href="/index.html" class="back-link">← Back to site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/shared/config.js"></script>
<script>
  // Landing page for Supabase password-recovery links (sent from auth.html's
  // "Forgot password?"). supabase-js exchanges the token in the URL for a
  // recovery session automatically; we show the form once that session
  // exists, update the password, and route onward via auth.html (which
  // already knows where each role should land).
  const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.MrBadmusConfig;
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ENV_QS = (function () {
    const env = new URLSearchParams(window.location.search).get('env');
    return env ? '?env=' + env : '';
  })();

  function show(stateId) {
    ['state-loading', 'state-invalid', 'state-form', 'state-done'].forEach(function (id) {
      document.getElementById(id).style.display = id === stateId ? 'block' : 'none';
    });
  }

  function showMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (text ? ' ' + type : '');
  }

  // Expired/invalid links come back with an error in the URL fragment,
  // e.g. #error=access_denied&error_description=Email+link+is+invalid+or+has+expired
  const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
  const linkError = hashParams.get('error_description') || new URLSearchParams(window.location.search).get('error_description');

  document.getElementById('btn-request-new').href = '/auth.html' + ENV_QS;

  if (linkError) {
    document.getElementById('invalid-reason').textContent =
      'That reset link has expired or was already used. Request a new one and try again.';
    show('state-invalid');
  } else {
    // The recovery token exchange is asynchronous — listen for the session,
    // with a fallback check and a timeout so nobody stares at a spinner.
    let resolved = false;

    function activateForm() {
      if (resolved) return;
      resolved = true;
      show('state-form');
      document.getElementById('new-password').focus();
    }

    sb.auth.onAuthStateChange(function (event, session) {
      if ((event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') && session) activateForm();
    });

    sb.auth.getSession().then(function (res) {
      if (res.data.session) activateForm();
    });

    setTimeout(function () {
      if (!resolved) show('state-invalid');
    }, 6000);
  }

  async function savePassword() {
    const pw  = document.getElementById('new-password').value;
    const pw2 = document.getElementById('confirm-password').value;
    if (pw.length < 8)  return showMsg('Password must be at least 8 characters.');
    if (pw !== pw2)     return showMsg('Those passwords don’t match — try again.');

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    const { error } = await sb.auth.updateUser({ password: pw });
    btn.disabled = false;

    if (error) {
      // e.g. "New password should be different from the old password."
      return showMsg(error.message);
    }

    showMsg('Password updated!', 'success');
    show('state-done');
    // updateUser leaves the user signed in; auth.html's session logic
    // routes students and staff to the right home page.
    setTimeout(function () {
      window.location.href = '/auth.html' + ENV_QS;
    }, 1500);
  }
</script>
</body>
</html>
