<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0F0F1A"/>
  <title>Your profile — Mr Badmus AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    html { background: #0F0F1A; }
    :root {
      --darker:    #0F0F1A;
      --dark:      #1A1A2E;
      --card:      #16213E;
      --card2:     #1A2545;
      --text:      #E8F4FD;
      --muted:     #8892A4;
      --physics:   #4ECDC4;
      --chemistry: #FFD2E6; --danger: #FF6B6B;
      --biology:   #6BCB77;
      --radius:    12px;
      --shadow:    0 4px 20px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--darker);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      padding: 80px 20px 60px;
      /* Hidden until the guard's onAllowed fires. Fail-closed: if the guard
         bounces or JS fails, the page never reveals staff content. */
      display: none;
    }

    nav.top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,26,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #2a2a4a;
      z-index: 10;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .pill.env-test { background: rgba(255,217,61,0.18); color: #FFD93D; }
    .pill.env-prod { background: rgba(136,136,136,0.18); color: var(--muted); }
    .signout-btn {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .signout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .container { max-width: 780px; margin: 0 auto; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-family: 'Sora', sans-serif; font-size: 1.7rem; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px;
      margin-bottom: 26px;
    }
    .field { margin-bottom: 28px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field-value { font-size: 1.15rem; font-weight: 600; }

    .dn-row { display: flex; gap: 10px; }
    .dn-row input {
      flex: 1;
      background: var(--card2);
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 12px;
    }
    .dn-row input:focus { outline: none; border-color: var(--physics); }
    .dn-row button {
      background: linear-gradient(135deg, #4ECDC4, #38a89d);
      border: none;
      border-radius: 8px;
      color: #0F0F1A;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 10px 18px;
      cursor: pointer;
    }
    .dn-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .dn-preview { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
    .dn-preview strong { color: var(--text); }
    .dn-msg { font-size: 0.82rem; margin-top: 8px; display: none; }
    .dn-msg.ok  { display: block; color: var(--biology); }
    .dn-msg.err { display: block; color: var(--danger); }

    .access-line { font-size: 1.05rem; font-weight: 600; }
    .access-line .sep { color: var(--muted); padding: 0 6px; }

    ul.class-list { list-style: none; }
    ul.class-list li {
      background: var(--card2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .empty { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="/index.html" style="font-family:'Sora',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);text-decoration:none;letter-spacing:0.01em;">MrBadmusAI</a>
  <div class="nav-right">
    <span id="env-pill" class="pill env-prod" style="display:none;">TEST</span>
    <button class="signout-btn" onclick="MrBadmusTeacherGuard.signOut()">Sign out</button>
  </div>
</nav>

<div class="container">
  <div class="page-header"><h1>Your profile</h1></div>

  <div class="card">
    <div class="field">
      <div class="field-label">What name should students see</div>
      <div class="dn-row">
        <input id="dn-input" type="text" maxlength="50" placeholder="e.g. Mr Badmus" autocomplete="off"/>
        <button id="dn-save" onclick="saveDisplayName()">Save</button>
      </div>
      <div class="dn-preview">Students will see: <strong><span id="dn-preview-name">…</span></strong></div>
      <div id="dn-msg" class="dn-msg"></div>
    </div>
    <div class="field">
      <div class="field-label">Your name</div>
      <div class="field-value" id="real-name">…</div>
    </div>
    <div class="field">
      <div class="field-label">Role &amp; access</div>
      <div class="access-line" id="access-line">…</div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <div class="field-label">Classes you teach</div>
      <ul class="class-list" id="class-list"></ul>
      <div class="empty" id="class-empty" style="display:none;">No classes assigned yet.</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/shared/config.js"></script>
<script src="/shared/teacher-guard.js"></script>
<script>
  // Thin teacher profile (Decision F v1): display name (editable via the
  // set_display_name RPC — the single write path), real name (read-only),
  // access as plain words, classes taught, sign out. Deliberately NO
  // pathway/tier/target-grade — those are student concepts.
  var sb = null;
  var uid = null;

  function showMsg(kind, text) {
    var el = document.getElementById('dn-msg');
    el.className = 'dn-msg ' + kind;
    el.textContent = text;
  }

  function updatePreview(name, fallback) {
    document.getElementById('dn-preview-name').textContent = (name && name.trim()) || fallback || 'your name';
  }

  async function saveDisplayName() {
    var input = document.getElementById('dn-input');
    var btn = document.getElementById('dn-save');
    var value = input.value.trim();
    btn.disabled = true;
    showMsg('', '');
    var res = await sb.rpc('set_display_name', { p_target: uid, p_name: value });
    btn.disabled = false;
    if (res.error) {
      // Surfaces the server-side guardrails: length cap, no links, permissions.
      var m = res.error.message || 'Could not save. Please try again.';
      if (m.indexOf('links') !== -1)         m = 'Display names can’t contain links.';
      else if (m.indexOf('too long') !== -1) m = 'That’s too long — 50 characters max.';
      showMsg('err', m);
      return;
    }
    showMsg('ok', 'Saved. Students now see “' + (value || 'your full name') + '”.');
    updatePreview(value, document.getElementById('real-name').textContent);
  }

  // Live preview while typing
  document.getElementById('dn-input').addEventListener('input', function () {
    updatePreview(this.value, document.getElementById('real-name').textContent);
  });

  MrBadmusTeacherGuard.requireTeacherRole({
    onAllowed: async function (ctx) {
      sb = MrBadmusTeacherGuard.getClient();
      uid = ctx.user.id;

      if (window.MrBadmusConfig.environment === 'test') {
        var pill = document.getElementById('env-pill');
        pill.className = 'pill env-test';
        pill.style.display = 'inline-block';
      }

      // Own row: names + display name (RLS self-read)
      var profRes = await sb.from('profiles')
        .select('first_name, last_name, display_name')
        .eq('id', uid).single();
      var p = profRes.data || {};
      var realName = ((p.first_name || '') + ' ' + (p.last_name || '')).trim() || '—';
      document.getElementById('real-name').textContent = realName;
      document.getElementById('dn-input').value = p.display_name || '';
      updatePreview(p.display_name, realName);

      // Access line in plain words (M8 vocabulary — never the word "scope"):
      // base "Teacher" + any live grants: hod → "Head of <dept>",
      // slt → "Senior leadership", school_admin → "School admin".
      var labels = ['Teacher'];
      var scopeRes = await sb.from('staff_scopes')
        .select('scope, department, started_at, ended_at, deleted_at')
        .eq('profile_id', uid);
      var nowIso = new Date().toISOString();
      (scopeRes.data || []).forEach(function (g) {
        var live = !g.deleted_at && g.started_at <= nowIso && (!g.ended_at || g.ended_at > nowIso);
        if (!live) return;
        if (g.scope === 'hod')          labels.push('Head of ' + (g.department || 'department'));
        else if (g.scope === 'slt')          labels.push('Senior leadership');
        else if (g.scope === 'school_admin') labels.push('School admin');
      });
      document.getElementById('access-line').innerHTML =
        labels.map(function (l) { return escapeHtml(l); }).join('<span class="sep">·</span>');

      // Classes taught (class_teachers self-read → class names)
      var ctRes = await sb.from('class_teachers')
        .select('ended_at, deleted_at, classes ( name )')
        .eq('teacher_id', uid);
      var names = (ctRes.data || [])
        .filter(function (r) { return !r.ended_at && !r.deleted_at && r.classes; })
        .map(function (r) { return r.classes.name; });
      var list = document.getElementById('class-list');
      if (names.length === 0) {
        document.getElementById('class-empty').style.display = 'block';
      } else {
        list.innerHTML = names.map(function (n) { return '<li>' + escapeHtml(n) + '</li>'; }).join('');
      }

      document.body.style.display = 'block';
    },
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
</script>
</body>
</html>
