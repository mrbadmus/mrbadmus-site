<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard | MrBadmusAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --darker: #0F0F1A; --dark: #1A1A2E; --card: #16213E;
      --physics: #4ECDC4; --chemistry: #FF6B6B; --biology: #6BCB77;
      --text: #E8E8F0; --muted: #888; --yellow: #FFD93D; --orange: #FF6B35;
      --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--darker); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

    .nav {
      position: sticky; top: 0; left: 0; right: 0; padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--dark); border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 100;
    }
    .nav-brand {
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.4rem; text-decoration: none;
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: flex; align-items: center; gap: 8px;
    }
    .brand-logo { flex-shrink: 0; }
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-weight: 700; font-size: 0.88rem; padding: 6px 14px; border-radius: 20px; }
    .nav-links a:hover { background: rgba(255,255,255,0.1); }

    .container { max-width: 720px; margin: 0 auto; padding: 28px 20px 40px; }

    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-family: 'Sora', sans-serif; font-size: 2rem; margin-bottom: 4px; }

    /* ── TABS ────────────────────────────────────── */
    .tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px; border-radius: 20px; border: 2px solid #2a2a4a;
      background: transparent; color: var(--muted); font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .tab:hover { border-color: #4a4a6a; }
    .tab.active { background: rgba(78,205,196,0.15); border-color: var(--physics); color: var(--physics); }
    .tab.active.bio { background: rgba(107,203,119,0.15); border-color: var(--biology); color: var(--biology); }
    .tab.active.chem { background: rgba(255,107,107,0.15); border-color: var(--chemistry); color: var(--chemistry); }
    .tab.active.phys { background: rgba(78,205,196,0.15); border-color: var(--physics); color: var(--physics); }
    .tab.active.overall { background: rgba(255,217,61,0.15); border-color: var(--yellow); color: var(--yellow); }

    .tier-toggle { display: flex; gap: 6px; justify-content: center; margin-bottom: 24px; }
    .tier-btn {
      padding: 6px 16px; border-radius: 16px; border: 2px solid #2a2a4a;
      background: transparent; color: var(--muted); font-weight: 700; font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .tier-btn:hover { border-color: #4a4a6a; }
    .tier-btn.active { border-color: var(--physics); background: rgba(78,205,196,0.1); color: var(--physics); }

    .week-info {
      text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; font-weight: 700;
    }

    /* ── PODIUM ──────────────────────────────────── */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin: 24px 0 36px; min-height: 260px; }
    .podium-slot { text-align: center; flex-shrink: 0; }
    .podium-slot.first { order: 2; }
    .podium-slot.second { order: 1; }
    .podium-slot.third { order: 3; }
    .podium-avatar {
      border-radius: 50%; overflow: hidden; margin: 0 auto 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; background: var(--dark);
    }
    .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .podium-slot.first .podium-avatar { width: 96px; height: 96px; border: 4px solid var(--gold); }
    .podium-slot.second .podium-avatar { width: 76px; height: 76px; border: 3px solid var(--silver); }
    .podium-slot.third .podium-avatar { width: 68px; height: 68px; border: 3px solid var(--bronze); }
    .podium-medal { font-size: 1.8rem; margin-bottom: 4px; }
    .podium-slot.first .podium-medal { font-size: 2.2rem; }
    .podium-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 0.9rem; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .podium-slot.first .podium-name { font-size: 1.05rem; max-width: 140px; }
    .podium-school { color: var(--muted); font-size: 0.72rem; font-weight: 700; }
    .podium-score { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.15rem; margin-top: 4px; }
    .podium-slot.first .podium-score { font-size: 1.3rem; color: var(--gold); }
    .podium-slot.second .podium-score { color: var(--silver); }
    .podium-slot.third .podium-score { color: var(--bronze); }
    .podium-extra { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .podium-base {
      border-radius: 12px 12px 0 0; margin-top: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.3rem; color: rgba(255,255,255,0.12);
    }
    .podium-slot.first .podium-base { background: linear-gradient(180deg, rgba(255,215,0,0.22) 0%, rgba(255,215,0,0.06) 100%); height: 96px; width: 126px; border: 1px solid rgba(255,215,0,0.18); }
    .podium-slot.second .podium-base { background: linear-gradient(180deg, rgba(192,192,192,0.18) 0%, rgba(192,192,192,0.05) 100%); height: 66px; width: 106px; border: 1px solid rgba(192,192,192,0.12); }
    .podium-slot.third .podium-base { background: linear-gradient(180deg, rgba(205,127,50,0.18) 0%, rgba(205,127,50,0.05) 100%); height: 46px; width: 106px; border: 1px solid rgba(205,127,50,0.12); }

    /* ── REST LIST ────────────────────────────────── */
    .rest-list { margin-top: 8px; }
    .rest-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; background: var(--card); border: 1px solid #2a2a4a;
      border-radius: 14px; margin-bottom: 8px;
    }
    .rest-rank { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.05rem; color: var(--muted); width: 28px; text-align: center; flex-shrink: 0; }
    .rest-avatar {
      width: 42px; height: 42px; border-radius: 50%; overflow: hidden;
      border: 2px solid #2a2a4a; display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem; background: var(--dark); flex-shrink: 0;
    }
    .rest-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .rest-info { flex: 1; min-width: 0; }
    .rest-name { font-weight: 800; font-size: 0.92rem; }
    .rest-school { color: var(--muted); font-size: 0.75rem; }
    .rest-score { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.05rem; flex-shrink: 0; }

    .empty {
      text-align: center; padding: 50px 20px;
      background: var(--card); border: 1px solid #2a2a4a; border-radius: 18px;
    }
    .empty h3 { font-family: 'Sora', sans-serif; margin: 16px 0 8px; }
    .empty p { color: var(--muted); }

    .loading { text-align: center; padding-top: 100px; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #2a2a4a; border-top-color: var(--physics);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .cta-challenge {
      display: block; text-align: center; margin-top: 28px; padding: 16px;
      border-radius: 16px; background: linear-gradient(135deg, var(--physics), #38a89d);
      color: #0F0F1A; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1rem;
      text-decoration: none; transition: all 0.2s;
    }
    .cta-challenge:hover { opacity: 0.9; transform: translateY(-2px); }

    @media (max-width: 600px) {
      .tabs { gap: 4px; }
      .tab { padding: 6px 12px; font-size: 0.78rem; }
      .podium { gap: 8px; min-height: 220px; }
      .podium-slot.first .podium-avatar { width: 76px; height: 76px; }
      .podium-slot.second .podium-avatar { width: 60px; height: 60px; }
      .podium-slot.third .podium-avatar { width: 54px; height: 54px; }
      .podium-slot.first .podium-base { width: 100px; height: 76px; }
      .podium-slot.second .podium-base { width: 86px; height: 52px; }
      .podium-slot.third .podium-base { width: 86px; height: 38px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/index.html"><svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 6l4-4 4 4" stroke="url(#navGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 6l4-4 4 4" stroke="url(#navGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(4,6)"/><defs><linearGradient id="navGrad" x1="4" y1="2" x2="16" y2="12" gradientUnits="userSpaceOnUse"><stop stop-color="#FFD93D"/><stop offset="1" stop-color="#FF6B35"/></linearGradient></defs></svg> MrBadmusAI</a>
  <div class="nav-links">
    <a href="/weekly-challenge.html">⚡ Challenge</a>
    <a href="/index.html">Home</a>
  </div>
</nav>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:var(--muted);">Loading leaderboard...</p>
  </div>

  <div id="content" style="display:none;">
    <div class="header">
      <h1>🏆 Leaderboard</h1>
    </div>

    <div class="tabs" id="subject-tabs">
      <button class="tab overall active" onclick="switchTab('overall', this)">🏅 Overall</button>
      <button class="tab bio" onclick="switchTab('biology', this)">🌿 Biology</button>
      <button class="tab chem" onclick="switchTab('chemistry', this)">🧪 Chemistry</button>
      <button class="tab phys" onclick="switchTab('physics', this)">⚡ Physics</button>
    </div>

    <div class="tier-toggle">
      <button class="tier-btn active" onclick="switchTier('foundation', this)">🌱 Foundation</button>
      <button class="tier-btn" onclick="switchTier('higher', this)">⭐ Higher</button>
    </div>

    <div class="week-info" id="week-info"></div>

    <div class="podium" id="podium"></div>
    <div class="rest-list" id="rest-list"></div>
    <div class="empty" id="empty" style="display:none;">
      <div style="font-size:3rem;">🏟️</div>
      <h3>No scores yet!</h3>
      <p>Be the first to complete the challenge and claim the top spot.</p>
    </div>

    <a href="/weekly-challenge.html" class="cta-challenge">Take the Weekly Challenge ⚡</a>
  </div>
</div>

<script>
  var RENDER_URL = 'https://mrbadmus-backend.onrender.com';
  var medals = ['🥇', '🥈', '🥉'];
  var currentSubject = 'overall';
  var currentTier = 'foundation';

  fetch(RENDER_URL + '/api/health').catch(function(){});

  function switchTab(subject, el) {
    currentSubject = subject;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    loadLeaderboard();
  }

  function switchTier(tier, el) {
    currentTier = tier;
    document.querySelectorAll('.tier-btn').forEach(function(b) { b.classList.remove('active'); });
    el.classList.add('active');
    loadLeaderboard();
  }

  async function loadLeaderboard() {
    document.getElementById('podium').innerHTML = '';
    document.getElementById('rest-list').innerHTML = '';
    document.getElementById('empty').style.display = 'none';

    var url;
    if (currentSubject === 'overall') {
      url = RENDER_URL + '/api/weekly-leaderboard?overall=true&tier=' + currentTier;
    } else {
      url = RENDER_URL + '/api/weekly-leaderboard?subject=' + currentSubject + '&tier=' + currentTier;
    }

    try {
      var res = await fetch(url);
      var data = await res.json();

      var infoEl = document.getElementById('week-info');
      if (currentSubject === 'overall') {
        infoEl.textContent = '🏅 Overall ' + currentTier.charAt(0).toUpperCase() + currentTier.slice(1) + ' — Week of ' + formatDate(data.week_start);
      } else {
        var subjectLabels = { biology: '🌿 Biology', chemistry: '🧪 Chemistry', physics: '⚡ Physics' };
        infoEl.textContent = (subjectLabels[currentSubject] || currentSubject) + ' ' + currentTier.charAt(0).toUpperCase() + currentTier.slice(1) + ' — Week of ' + formatDate(data.week_start);
      }

      var lb = data.leaderboard || [];
      if (lb.length === 0) {
        document.getElementById('empty').style.display = 'block';
        return;
      }

      // Podium
      var podiumHtml = '';
      var podiumClasses = ['', 'first', 'second', 'third'];
      var rankLabels = ['1st', '2nd', '3rd'];
      for (var i = 0; i < Math.min(3, lb.length); i++) {
        var p = lb[i];
        var avatarContent = p.avatar_url ? '<img src="' + p.avatar_url + '" alt=""/>' : '🧑‍🎓';
        var timeTxt = p.time_taken ? formatTime(p.time_taken) : '';
        var extraInfo = '';
        if (currentSubject === 'overall' && p.subjects_done) {
          extraInfo = '<div class="podium-extra">' + p.subjects_done + '/3 subjects</div>';
        }
        podiumHtml += '<div class="podium-slot ' + podiumClasses[i + 1] + '">' +
          '<div class="podium-medal">' + medals[i] + '</div>' +
          '<div class="podium-avatar">' + avatarContent + '</div>' +
          '<div class="podium-name">' + esc(p.name) + '</div>' +
          (p.school ? '<div class="podium-school">' + esc(p.school) + '</div>' : '') +
          '<div class="podium-score">' + p.score + '/' + p.max_score + '</div>' +
          (timeTxt ? '<div class="podium-extra">' + timeTxt + '</div>' : '') +
          extraInfo +
          '<div class="podium-base">' + rankLabels[i] + '</div></div>';
      }
      document.getElementById('podium').innerHTML = podiumHtml;

      // Rest (4th–10th)
      if (lb.length > 3) {
        var restHtml = '';
        for (var j = 3; j < lb.length; j++) {
          var r = lb[j];
          var rAvatar = r.avatar_url ? '<img src="' + r.avatar_url + '" alt=""/>' : '🧑‍🎓';
          var rExtra = '';
          if (currentSubject === 'overall' && r.subjects_done) {
            rExtra = ' <span style="color:var(--muted);font-size:0.72rem;">(' + r.subjects_done + '/3)</span>';
          }
          restHtml += '<div class="rest-item">' +
            '<span class="rest-rank">' + r.rank + '</span>' +
            '<div class="rest-avatar">' + rAvatar + '</div>' +
            '<div class="rest-info">' +
              '<div class="rest-name">' + esc(r.name) + (r.school ? ' <span style="color:var(--muted);font-weight:600;font-size:0.78rem;">· ' + esc(r.school) + '</span>' : '') + '</div>' +
            '</div>' +
            '<span class="rest-score">' + r.score + '/' + r.max_score + rExtra + '</span></div>';
        }
        document.getElementById('rest-list').innerHTML = restHtml;
      }

    } catch (err) {
      console.error(err);
      document.getElementById('empty').style.display = 'block';
      document.querySelector('#empty h3').textContent = 'Could not load leaderboard';
      document.querySelector('#empty p').textContent = 'Try refreshing the page.';
    }
  }

  async function init() {
    try {
      await loadLeaderboard();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch (err) {
      document.getElementById('loading').innerHTML = '<p style="color:var(--chemistry);">Could not load leaderboard. Try refreshing.</p>';
    }
  }
  init();

  function formatDate(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr + 'T00:00:00');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }
  function formatTime(secs) {
    var m = Math.floor(secs / 60); var s = secs % 60;
    return m + 'm ' + s + 's';
  }
  function esc(str) {
    var div = document.createElement('div'); div.textContent = str; return div.innerHTML;
  }
</script>
</body>
</html>
